[project]
name = "catdetector-model"
version = "0.1.0"
description = "Shared model and inference preprocessing for Cat Detector."
requires-python = ">=3.14"
dependencies = [
    "lightning>=2.6.5",
    "torch>=2.12.0",
    "torchmetrics>=1.9.0",
    "torchvision>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
